<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Archive | أثر</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
        }

        .projects-archive-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-96) var(--spacing-24);
        }

        .archive-header {
            text-align: center;
            margin-bottom: var(--spacing-64);
        }

        .archive-title {
            font-size: var(--text-5xl);
            margin-bottom: var(--spacing-16);
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* The dynamic container will not be a grid itself, but will contain header + grid pairs */
        #dynamic-archive-grid {
            display: block;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-24);
            margin-bottom: var(--spacing-64);
        }

        .archive-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all var(--transition-normal);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .archive-card:hover {
            transform: translateY(-8px);
            border-color: var(--color-secondary);
            box-shadow: var(--glow-primary);
        }

        .archive-img-box {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .archive-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            opacity: 0.6;
            color: transparent;
            font-size: 0;
        }

        .tech-badge-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 2;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.7) 0%, rgba(139, 92, 246, 0.3) 100%);
            padding: 8px 18px;
            border-radius: var(--radius-full);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            letter-spacing: 0.5px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tech-badge-overlay::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .archive-card:hover .tech-badge-overlay {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .archive-content {
            padding: var(--spacing-24);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .archive-tag {
            color: var(--color-secondary);
            font-weight: 700;
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: var(--spacing-8);
        }

        .archive-item-title {
            font-size: var(--text-lg);
            margin-bottom: var(--spacing-12);
            line-height: 1.3;
        }

        .archive-item-desc {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-24);
            line-height: 1.6;
        }

        .archive-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
        }

        .archive-tags span {
            font-size: 9px;
            padding: 3px 8px;
            background: rgba(124, 58, 237, 0.1);
            border-radius: var(--radius-full);
            color: var(--color-accent);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .back-nav {
            margin-bottom: var(--spacing-48);
        }

        .btn-back {
            color: var(--color-text-main);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: var(--text-xs);
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-full);
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-back:hover {
            color: #fff;
            background: rgba(124, 58, 237, 0.15);
            border-color: var(--color-primary);
            transform: translateX(-5px);
        }
    </style>
</head>

<body class="animate-fade-in">
    <div class="projects-archive-container">
        <nav class="back-nav">
            <a href="index.html?return=true" class="btn-back"><span>←</span> RETURN TO JOURNEY</a>
        </nav>

        <header class="archive-header">
            <h1 class="archive-title">Projects Archive</h1>
            <p style="color: var(--color-text-muted); max-width: 600px; margin: 0 auto;">A comprehensive timeline of
                Engineering, Data Science, and AI Solutions.</p>
        </header>

        <div id="dynamic-archive-grid">
            <!-- Content will be injected by github-projects.js -->
            <div class="text-center"
                style="padding: 100px; color: var(--color-text-muted); font-family: var(--font-display);">
                Synchronizing with GitHub Account...
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="js/navigation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/github-projects.js"></script>
    <script src="js/chat.js"></script>
</body>

</html>
